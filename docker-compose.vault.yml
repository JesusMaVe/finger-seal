version: "3.9"
services:
  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: fingerseal-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    volumes:
      - vault-data:/vault/file

volumes:
  vault-data:
